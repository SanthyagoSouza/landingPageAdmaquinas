<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Redirecionando...</title>

  <script>
    // pega a rota acessada
    var path = window.location.pathname;

    // salva a rota
    sessionStorage.setItem("redirect_path", path);

    // redireciona pra home
    window.location.href = "/";
  </script>
</head>

<body></body>
</html>
